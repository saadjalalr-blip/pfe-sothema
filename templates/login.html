{% extends 'base.html' %}
{% set titre = 'Connexion' %}

{% block content %}

<div style="max-width: 400px; margin: 80px auto;">

  <div class="section-label">Accès sécurisé</div>
  <h1 class="section-title">Connexion</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div style="padding: 12px 16px; margin-bottom: 16px; border-radius: 8px;
                  background: {{ 'rgba(211,47,47,0.1)' if category == 'error' else 'rgba(46,125,50,0.1)' }};
                  color: {{ '#D32F2F' if category == 'error' else '#2E7D32' }};
                  border: 1px solid {{ '#D32F2F' if category == 'error' else '#2E7D32' }};">
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/login">
    <div class="form-group" style="margin-bottom: 16px;">
      <label>Email</label>
      <input type="email" name="email" placeholder="votre@email.com" required
             style="width:100%; padding:10px 14px; border:1px solid rgba(0,32,96,0.15); border-radius:8px; font-size:14px;"/>
    </div>
    <div class="form-group" style="margin-bottom: 24px;">
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="Votre mot de passe" required
             style="width:100%; padding:10px 14px; border:1px solid rgba(0,32,96,0.15); border-radius:8px; font-size:14px;"/>
    </div>
    <button type="submit" class="btn-ajouter" style="width:100%;">
      Se connecter
    </button>
  </form>

  <p style="text-align:center; margin-top:20px; font-size:14px; color:rgba(26,37,64,0.6);">
    Pas encore de compte ? <a href="/signup" style="color:var(--gold);">S'inscrire</a>
  </p>

</div>

{% endblock %}
